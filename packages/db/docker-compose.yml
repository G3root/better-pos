name: better-pos

services:
  postgres:
    image: postgres
    container_name: better-pos-postgres
    environment:
      POSTGRES_DB: better-pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - better-pos_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  better-pos_postgres_data:
